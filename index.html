  <!-- FOUC Prevention: ocultar hasta que App.init() renderice el contenido -->
  <style>
    html:not(.app-ready) { opacity: 0; }
    html.app-ready { opacity: 1; transition: opacity 0.15s ease; }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        document.documentElement.classList.add('app-ready');
      }, 50);
    });
    setTimeout(function() {
      document.documentElement.classList.add('app-ready');
    }, 5000);
  </script>
